services:
  - type: web
    name: support-ai-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: SupportAI Platform
      - key: APP_VERSION
        value: 1.0.0
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        value: sqlite:///./supportai.db
      - key: API_PREFIX
        value: /api/v1
      - key: LOG_LEVEL
        value: INFO
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: OPENROUTER_MODEL
        value: openai/gpt-oss-20b:free
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
