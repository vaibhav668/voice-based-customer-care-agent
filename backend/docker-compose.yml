version: "3.9"

services:

  support-ai:

    build: .

    container_name: support-ai

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./generated_audio:/app/generated_audio
      - ./knowledge:/app/knowledge
      - ./chroma_db:/app/chroma_db

    restart: unless-stopped