<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Support AI Login</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚌</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>

        :root {
            --ink: #0b1220;
            --ink-deep: #070c16;
            --surface: #131f33;
            --surface-2: #1a2a44;
            --line: #29395a;
            --amber: #ffb13d;
            --amber-soft: #ffd685;
            --teal: #35d8b6;
            --danger: #ff7a7a;
            --text: #eef2fa;
            --text-dim: #8fa0bf;
            --radius-lg: 22px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 8%, rgba(255,177,61,0.10), transparent 40%),
                radial-gradient(circle at 88% 92%, rgba(53,216,182,0.10), transparent 45%),
                linear-gradient(180deg, var(--ink-deep), var(--ink) 60%);
            position: relative;
            overflow-x: hidden;
        }

        /* dotted route line drifting across the background, like a bus route map */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 26px 26px;
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 44px 36px 34px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
        }

        /* punch-hole ticket notches */
        .auth-card::before,
        .auth-card::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--ink-deep);
            box-shadow: inset 0 0 0 1px var(--line);
        }
        .auth-card::before { left: -13px; }
        .auth-card::after { right: -13px; }

        .ticket-edge {
            position: absolute;
            left: 26px;
            right: 26px;
            top: 128px;
            border-top: 2px dashed var(--line);
        }

        .logo {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border-radius: 16px;
            background: linear-gradient(145deg, var(--amber), #ff8f3d);
            box-shadow: 0 10px 24px -8px rgba(255,177,61,0.55);
            margin: 0 auto 18px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin: 0 0 4px;
            letter-spacing: -0.01em;
        }

        .auth-card > p {
            text-align: center;
            color: var(--text-dim);
            font-size: 13.5px;
            margin: 0 0 34px;
        }

        form#login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i.fa-envelope,
        .input-group i.fa-lock {
            position: absolute;
            left: 16px;
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 42px;
            background: var(--surface-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        .input-group input::placeholder { color: var(--text-dim); }

        .input-group input:focus {
            border-color: var(--amber);
            box-shadow: 0 0 0 3px rgba(255,177,61,0.18);
        }

        #toggle-password {
            position: absolute;
            right: 16px;
            color: var(--text-dim);
            font-size: 14px;
            cursor: pointer;
        }
        #toggle-password:hover { color: var(--text); }

        .login-btn {
            margin-top: 6px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--amber), #ff8f3d);
            color: #1a1102;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform .12s ease, box-shadow .12s ease;
            box-shadow: 0 14px 26px -12px rgba(255,177,61,0.55);
        }
        .login-btn:hover { transform: translateY(-1px); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 3px; }

        .bottom-text {
            text-align: center;
            margin: 24px 0 0;
            font-size: 13.5px;
            color: var(--text-dim);
        }

        .bottom-text a {
            color: var(--amber-soft);
            text-decoration: none;
            font-weight: 600;
        }
        .bottom-text a:hover { text-decoration: underline; }

        #message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            color: var(--danger);
            min-height: 0;
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }

    </style>

</head>

<body>

<div id="lang-selector-container" style="position: fixed; top: 16px; right: 20px; z-index: 1000;"></div>

<div class="auth-container">

    <div class="auth-card">

        <div class="ticket-edge"></div>

        <div class="logo">

            🚌

        </div>

        <h1 data-i18n="app_title">

            Support AI

        </h1>

        <p data-i18n="login_subtitle">

            Sign in to continue

        </p>

        <form id="login-form">

            <div class="input-group" style="display: flex; gap: 8px;">
                <div style="position: relative; flex: 1; display: flex; align-items: center;">
                    <i class="fa-solid fa-phone" style="position: absolute; left: 15px;"></i>
                    <input
                        id="phone"
                        type="tel"
                        placeholder="Phone Number"
                        data-i18n-placeholder="phone_placeholder"
                        style="padding-left: 40px; width: 100%;"
                        required>
                </div>
                <button
                    id="send-otp-btn"
                    type="button"
                    style="margin-top: 0; width: auto; white-space: nowrap; padding: 0 16px; font-size: 13.5px; background: linear-gradient(135deg, var(--teal), var(--blue)); border: none; color: white; border-radius: 8px; cursor: pointer;">
                    Send OTP
                </button>
            </div>

            <div class="input-group">

                <i class="fa-solid fa-key"></i>

                <input
                    id="otp"
                    type="text"
                    placeholder="OTP"
                    data-i18n-placeholder="otp_placeholder"
                    required>

            </div>

            <button
                type="submit"
                class="login-btn"
                data-i18n="login_btn">

                Login

            </button>

        </form>

        <p class="bottom-text">

            <span data-i18n="no_account">Don't have an account?</span>

            <a href="register.html" data-i18n="register_link">

                Register

            </a>

        </p>

        <div id="message"></div>

    </div>

</div>

<script
    type="module"
    src="js/login.js"></script>

</body>

</html>
