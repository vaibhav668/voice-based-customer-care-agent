<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎟️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>

        :root {
            --ink: #0b1220;
            --ink-deep: #070c16;
            --surface: #131f33;
            --surface-2: #1a2a44;
            --line: #29395a;
            --amber: #ffb13d;
            --amber-soft: #ffd685;
            --teal: #35d8b6;
            --danger: #ff7a7a;
            --text: #eef2fa;
            --text-dim: #8fa0bf;
            --radius-lg: 22px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 8%, rgba(53,216,182,0.10), transparent 40%),
                radial-gradient(circle at 88% 92%, rgba(255,177,61,0.10), transparent 45%),
                linear-gradient(180deg, var(--ink-deep), var(--ink) 60%);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 26px 26px;
            pointer-events: none;
        }

        .auth-card {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 44px 36px 34px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
            z-index: 1;
        }

        .auth-card::before,
        .auth-card::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--ink-deep);
            box-shadow: inset 0 0 0 1px var(--line);
        }
        .auth-card::before { left: -13px; }
        .auth-card::after { right: -13px; }

        .ticket-edge {
            position: absolute;
            left: 26px;
            right: 26px;
            top: 122px;
            border-top: 2px dashed var(--line);
        }

        .logo-mark {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            border-radius: 16px;
            background: linear-gradient(145deg, var(--teal), #1fa88a);
            box-shadow: 0 10px 24px -8px rgba(53,216,182,0.5);
            margin: 0 auto 18px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin: 0 0 34px;
            letter-spacing: -0.01em;
        }

        form#register-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 6px;
        }

        .field {
            position: relative;
            display: flex;
            align-items: center;
        }

        .field i {
            position: absolute;
            left: 16px;
            color: var(--text-dim);
            font-size: 14px;
            pointer-events: none;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 42px;
            background: var(--surface-2);
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14.5px;
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }

        input::placeholder { color: var(--text-dim); }

        input:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(53,216,182,0.16);
        }

        button {
            margin-top: 6px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--teal), #1fa88a);
            color: #052019;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform .12s ease;
            box-shadow: 0 14px 26px -12px rgba(53,216,182,0.5);
        }
        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

        .auth-card > p {
            text-align: center;
            margin: 24px 0 0;
            font-size: 13.5px;
            color: var(--text-dim);
        }

        .auth-card > p a {
            color: var(--amber-soft);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-card > p a:hover { text-decoration: underline; }

        #message {
            margin-top: 16px;
            font-size: 13px;
            text-align: center;
            color: var(--danger);
        }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; }
        }

    </style>

</head>

<body>

<div id="lang-selector-container" style="position: fixed; top: 16px; right: 20px; z-index: 1000;"></div>

<div class="auth-card">

    <div class="ticket-edge"></div>

    <div class="logo-mark">🎟️</div>

    <h1 data-i18n="register_title">Create Account</h1>

    <form id="register-form">

        <div class="field">
            <i class="fa-solid fa-user"></i>
            <input
                id="full_name"
                placeholder="Full Name"
                data-i18n-placeholder="fullname_placeholder"
                required>
        </div>

        <div class="field">
            <i class="fa-solid fa-envelope"></i>
            <input
                id="email"
                type="email"
                placeholder="Email"
                data-i18n-placeholder="email_placeholder"
                required>
        </div>

        <div class="field">
            <i class="fa-solid fa-phone"></i>
            <input
                id="phone"
                placeholder="Phone Number"
                data-i18n-placeholder="phone_placeholder"
                required>
        </div>

        <div class="field">
            <i class="fa-solid fa-lock"></i>
            <input
                id="password"
                type="password"
                placeholder="Password"
                data-i18n-placeholder="password_placeholder"
                required>
        </div>

        <button data-i18n="register_btn">

            Register

        </button>

    </form>

    <p>

        <span data-i18n="has_account">Already have an account?</span>

        <a href="login.html" data-i18n="login_link">

            Login

        </a>

    </p>

    <div id="message"></div>

</div>

<script
type="module"
src="js/register.js">

</script>

</body>

</html>
