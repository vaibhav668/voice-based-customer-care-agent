<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation History</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📜</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b1220;
            --surface: #131f33;
            --surface-hover: #1c2c47;
            --line: #29395a;
            --teal: #35d8b6;
            --blue: #3b82f6;
            --purple: #a855f7;
            --amber: #ffb13d;
            --text: #eef2fa;
            --text-dim: #8fa0bf;
            --radius-lg: 20px;
            --radius-md: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, #070c16, var(--bg-dark));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 28px;
            border-bottom: 1px solid var(--line);
            background: rgba(19, 31, 51, 0.7);
            backdrop-filter: blur(12px);
        }

        .header-title h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
        }
        .header-title p {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn {
            background: var(--surface);
            border: 1px solid var(--line);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: .2s ease;
        }
        .nav-btn:hover { border-color: var(--teal); color: var(--teal); }

        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 75px);
            overflow: hidden;
        }

        /* Left Panel - Conversation List */
        .list-panel {
            width: 380px;
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.4);
        }

        .search-box {
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }

        .search-input-wrap {
            position: relative;
        }

        .search-input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 14px;
        }

        .search-input-wrap input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            color: var(--text);
            font-size: 13.5px;
            outline: none;
            transition: border-color .15s ease;
        }
        .search-input-wrap input:focus { border-color: var(--teal); }

        .filter-tabs {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
        }

        .tab-btn {
            flex: 1;
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: .15s ease;
        }
        .tab-btn.active, .tab-btn:hover {
            background: var(--teal);
            color: #0b1220;
            border-color: var(--teal);
        }

        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .conv-card {
            padding: 14px 16px;
            border-radius: var(--radius-md);
            background: var(--surface);
            border: 1px solid var(--line);
            margin-bottom: 10px;
            cursor: pointer;
            transition: all .2s ease;
        }
        .conv-card:hover, .conv-card.active {
            border-color: var(--teal);
            background: var(--surface-hover);
        }

        .conv-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .channel-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 999px;
            text-transform: uppercase;
        }
        .badge-chat { background: rgba(59, 130, 246, 0.2); color: var(--blue); border: 1px solid var(--blue); }
        .badge-voice { background: rgba(168, 85, 247, 0.2); color: var(--purple); border: 1px solid var(--purple); }

        .conv-time {
            font-size: 11px;
            color: var(--text-dim);
        }

        .conv-intent {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }

        .conv-preview {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Right Panel - Chat Detail */
        .detail-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
        }

        .detail-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(19, 31, 51, 0.4);
        }

        .detail-header-info h2 {
            font-size: 16px;
            font-weight: 700;
        }
        .detail-header-info p {
            font-size: 12px;
            color: var(--text-dim);
        }

        .messages-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .empty-state {
            margin: auto;
            text-align: center;
            color: var(--text-dim);
        }
        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            color: var(--line);
        }

        .msg-bubble-wrap {
            display: flex;
            flex-direction: column;
            max-width: 75%;
        }

        .msg-user { align-self: flex-end; }
        .msg-ai { align-self: flex-start; }

        .msg-sender-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .msg-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-user .msg-bubble {
            background: linear-gradient(135deg, var(--blue), #1d4ed8);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-ai .msg-bubble {
            background: var(--surface);
            border: 1px solid var(--line);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .msg-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .meta-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--line);
        }

        audio {
            margin-top: 10px;
            width: 100%;
            height: 36px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<header>
    <div class="header-title">
        <h1 data-i18n="history_title">📜 Conversation History</h1>
        <p data-i18n="history_subtitle">Permanent record of all text and voice support interactions</p>
    </div>
    <div class="header-actions">
        <div id="lang-selector-container"></div>
        <button class="nav-btn" onclick="location.href='../dashboard.html'" data-i18n="nav_dashboard">
            Dashboard
        </button>
    </div>
</header>

<div class="main-container">
    <!-- Left Panel: Conversations List -->
    <div class="list-panel">
        <div class="search-box">
            <div class="search-input-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="history-search" placeholder="Search by booking code, intent, message..." data-i18n-placeholder="search_history_placeholder">
            </div>
        </div>

        <div class="filter-tabs">
            <button class="tab-btn active" data-channel="" data-i18n="all_channels">All</button>
            <button class="tab-btn" data-channel="CHAT" data-i18n="chat_channel">Chat</button>
            <button class="tab-btn" data-channel="VOICE" data-i18n="voice_channel">Voice</button>
        </div>

        <div class="conv-list" id="conv-list">
            <div class="empty-state">
                <p>Loading history...</p>
            </div>
        </div>
    </div>

    <!-- Right Panel: Conversation Transcript Detail -->
    <div class="detail-panel">
        <div class="detail-header" id="detail-header" style="display: none;">
            <div class="detail-header-info">
                <h2 id="detail-session-id">Session ID</h2>
                <p id="detail-meta-text">Channel & Intent</p>
            </div>
        </div>

        <div class="messages-container" id="messages-container">
            <div class="empty-state">
                <i class="fa-regular fa-comments"></i>
                <p data-i18n="select_conversation_prompt">Select a conversation from the left to view full chat history.</p>
            </div>
        </div>
    </div>
</div>

<script type="module" src="../js/history.js"></script>

</body>
</html>
