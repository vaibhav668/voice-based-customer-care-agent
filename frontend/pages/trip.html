<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trip Status</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <style>

        :root {
            --ink: #0b1220; --ink-deep: #070c16;
            --surface: #131f33; --surface-2: #1a2a44;
            --line: #29395a; --amber: #ffb13d; --amber-soft: #ffd685;
            --teal: #35d8b6; --danger: #ff7a7a;
            --text: #eef2fa; --text-dim: #8fa0bf;
            --radius-lg: 20px; --radius-sm: 10px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            background: linear-gradient(180deg, var(--ink-deep), var(--ink) 60%);
            padding: 28px 20px 60px;
        }

        .shell { max-width: 640px; margin: 0 auto; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.01em;
        }

        header button {
            background: var(--surface-2);
            border: 1px solid var(--line);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 13.5px;
            padding: 10px 18px;
            border-radius: 999px;
            cursor: pointer;
            transition: border-color .15s ease, transform .12s ease;
        }
        header button:hover { border-color: var(--teal); transform: translateY(-1px); }

        .route-line {
            height: 2px;
            margin: 20px 0 28px;
            background-image: repeating-linear-gradient(90deg, var(--line) 0 10px, transparent 10px 18px);
            position: relative;
        }
        .route-line::after {
            content: '🚌';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            animation: drive 8s linear infinite;
        }
        @keyframes drive {
            0% { left: 0; }
            100% { left: calc(100% - 16px); }
        }

        #trip-card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            padding: 30px;
            min-height: 160px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-dim);
        }

        #trip-card::before,
        #trip-card::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--ink-deep);
            box-shadow: inset 0 0 0 1px var(--line);
        }
        #trip-card::before { left: -13px; }
        #trip-card::after { right: -13px; }

        @media (prefers-reduced-motion: reduce) {
            .route-line::after { animation: none; }
        }

    </style>

</head>

<body>

<div class="shell">

<header>

    <h1 data-i18n="nav_trips">🚌 Trip Status</h1>

    <div style="display: flex; align-items: center; gap: 10px;">
        <div id="lang-selector-container"></div>
        <button onclick="location.href='bookings.html'" data-i18n="nav_bookings">
            ← My Bookings
        </button>
    </div>

</header>

<div class="route-line" aria-hidden="true"></div>

<div id="trip-card">

Loading trip...

</div>

</div>

<script
type="module"
src="../js/trip.js">

</script>

</body>

</html>
