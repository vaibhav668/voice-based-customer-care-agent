<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice Assistant</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎤</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

<style>

    :root {
        --ink: #0b1220; --ink-deep: #070c16;
        --surface: #131f33; --surface-2: #1a2a44;
        --line: #29395a; --amber: #ffb13d; --amber-soft: #ffd685;
        --teal: #35d8b6; --danger: #ff7a7a;
        --text: #eef2fa; --text-dim: #8fa0bf;
        --radius-lg: 20px; --radius-sm: 10px;
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, var(--ink-deep), var(--ink) 60%);
        padding: 28px 20px 60px;
    }

    .shell { max-width: 720px; margin: 0 auto; }

    header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 8px;
    }

    h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 22px;
        font-weight: 700;
        margin: 0;
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    header button {
        background: var(--surface-2);
        border: 1px solid var(--line);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 13.5px;
        padding: 10px 18px;
        border-radius: 999px;
        cursor: pointer;
        transition: border-color .15s ease, transform .12s ease;
    }
    header button:hover { border-color: var(--amber); transform: translateY(-1px); }

    .route-line {
        height: 2px;
        margin: 20px 0 28px;
        background-image: repeating-linear-gradient(90deg, var(--line) 0 10px, transparent 10px 18px);
        position: relative;
    }
    .route-line::after {
        content: '🚌';
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
        font-size: 14px;
        animation: drive 7s linear infinite;
    }
    @keyframes drive {
        0% { left: 0; }
        100% { left: calc(100% - 16px); }
    }

    .ticket-card {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        padding: 26px;
        margin-bottom: 22px;
    }

    #conversation {
        min-height: 220px;
        max-height: 420px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding-right: 4px;
    }

    .voice-placeholder {
        margin: 0;
        color: var(--text-dim);
        font-size: 14.5px;
        text-align: center;
        padding: 40px 0;
    }

    .transcript-box, .response-box {
        background: var(--surface-2);
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 14px 18px;
        margin-bottom: 12px;
    }
    .transcript-box p, .response-box p {
        margin: 6px 0 0;
        color: var(--text);
        font-size: 14.5px;
        line-height: 1.5;
        text-align: left;
        padding: 0;
    }

    .record-row {
        display: flex;
        justify-content: center;
        margin: 4px 0 30px;
    }

    #record {
        display: flex;
        align-items: center;
        gap: 10px;
        border: none;
        border-radius: 999px;
        padding: 16px 30px;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 15px;
        color: #1a1102;
        background: linear-gradient(135deg, var(--amber), #ff8f3d);
        cursor: pointer;
        box-shadow: 0 16px 30px -14px rgba(255,177,61,0.6);
        position: relative;
        transition: transform .12s ease;
    }
    #record:hover { transform: translateY(-1px); }
    #record::before {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 999px;
        border: 2px solid rgba(255,177,61,0.4);
        animation: pulse 2.2s ease-out infinite;
    }
    @keyframes pulse {
        0% { transform: scale(0.92); opacity: 0.9; }
        70% { transform: scale(1.18); opacity: 0; }
        100% { opacity: 0; }
    }

    h3 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0 0 16px;
    }

    .upload-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
    }

    input[type="file"] {
        flex: 1;
        min-width: 180px;
        color: var(--text-dim);
        font-size: 13.5px;
        font-family: 'Inter', sans-serif;
        background: var(--surface-2);
        border: 1px dashed var(--line);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
    }
    input[type="file"]::file-selector-button {
        background: var(--teal);
        color: #052019;
        border: none;
        border-radius: 6px;
        padding: 7px 12px;
        font-weight: 700;
        font-size: 12.5px;
        margin-right: 12px;
        cursor: pointer;
    }

    #upload-btn {
        border: 1px solid var(--teal);
        background: transparent;
        color: var(--teal);
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 13.5px;
        padding: 12px 20px;
        border-radius: var(--radius-sm);
        cursor: pointer;
        transition: background .15s ease, color .15s ease;
    }
    #upload-btn:hover { background: var(--teal); color: #052019; }

    .keypad-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        margin-top: 14px;
    }
    .keypad-btn {
        background: var(--surface-2);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: all 0.15s ease;
    }
    .keypad-btn:hover, .keypad-btn.active {
        border-color: var(--amber);
        background: rgba(255, 177, 61, 0.15);
        color: var(--amber-soft);
    }

    @media (max-width: 480px) {
        header { flex-wrap: wrap; }
        .keypad-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (prefers-reduced-motion: reduce) {
        .route-line::after, #record::before { animation: none; }
    }

</style>

</head>

<body>

<div class="shell">

<header>

<h1 data-i18n="voice_title">🎤 Voice Assistant</h1>

<div style="display: flex; align-items: center; gap: 10px;">
    <div id="lang-selector-container"></div>
    <button
        onclick="location.href='../dashboard.html'"
        data-i18n="nav_dashboard">

        Dashboard

    </button>
</div>

</header>

<div class="route-line" aria-hidden="true"></div>

<div class="ticket-card">

<div id="conversation">

    <p class="voice-placeholder" data-i18n="voice_subtitle">Click the microphone or upload an audio file.</p>

</div>

</div>

<div class="record-row">

<button id="record" data-i18n="voice_start_record">

🎤 Start Recording

</button>

</div>

<hr>

<div class="ticket-card">

<h3 data-i18n="voice_upload_heading">Upload Recording</h3>

<div class="upload-row">

<input
type="file"
id="audio-file"
accept="audio/*">

<button id="upload-btn" data-i18n="voice_upload_btn">

Upload Recording

</button>

</div>

</div>

</div>

<script type="module" src="../js/voice.js?v=1.0.2"></script>

</body>

</html>
